<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Items</title>
    <link rel="stylesheet" href="style.css" />
    <script src="gameTable.js" defer></script>
  </head>
  <body>
    <div class="header">
      <div class="topOptions">
        <text class="topOptionsText">ⒸSteam</text>
        <text class="topOptionsText">View</text>
        <text class="topOptionsText">Friends</text>
        <text class="topOptionsText">Help</text>
      </div>
      <div class="navBox">   
        <text class="navArrows">⇦  ⇨</text> 
        <button class="TextButton">STORE</button>      
        <button class="TextButton">LIBRARY</button>      
        <button class="TextButton">COMMUNITY</button>
        <button class="TextButton">HILO</button>
      </div>
    </div>
    <div class="steamLibrary">
      <div class="menuBox">
        <div class="menu">
          <input placeholder="Games and Soundtracks" class="menuField">
          <input placeholder="⌕" class="menuField">
        </input></div>
      </div>
      <game-table></game-table>
    </div>
  </body>
</html>
